<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Rush</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" href="/items/favicon.svg" type="image/svg+xml">
</head>
<body>
    <header class="top-bar">
        <div class="logo-container">
            <a href="index.html">
                <img src="/items/Logo rush.PNG" alt="Rush Logo" class="logo">
            </a>
        </div>
        <div class="logout-btn-container">
            <button id="logout-btn" class="logout-btn">LOGOUT</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-header">
            <h1>RUSH CONTROL PANEL</h1>
            <div id="loader" class="loader"></div>
        </div>

        <div class="admin-nav-wrapper">
            <button id="admin-menu-toggle" class="admin-menu-toggle">
                <span id="current-tab-name">EVENTS</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <nav class="admin-tabs" id="admin-tabs">
                <button class="tab-btn active" data-tab="events">EVENTS</button>
                <button class="tab-btn" data-tab="djs">RESIDENT DJs</button>
                <button class="tab-btn" data-tab="merch">MERCH</button>
                <button class="tab-btn" data-tab="settings">SETTINGS</button>
            </nav>
        </div>

        <!-- EVENTS TAB -->
        <section id="events" class="tab-content active">
            <div class="admin-section-header">
                <h2>Manage Events</h2>
                <button class="add-btn" onclick="openModal('event')">+ ADD EVENT</button>
            </div>
            <div id="admin-events-list" class="admin-list">
                <!-- Dinamico -->
            </div>
        </section>

        <!-- DJs TAB -->
        <section id="djs" class="tab-content">
            <div class="admin-section-header">
                <h2>Manage Resident DJs</h2>
                <button class="add-btn" onclick="openModal('dj')">+ ADD DJ</button>
            </div>
            <div id="admin-djs-list" class="admin-list">
                <!-- Dinamico -->
            </div>
        </section>

        <!-- MERCH TAB -->
        <section id="merch" class="tab-content">
            <div class="admin-section-header">
                <h2>Manage Merch</h2>
                <button class="add-btn" onclick="openModal('merch')">+ ADD ITEM</button>
            </div>
            <div id="admin-merch-list" class="admin-list">
                <!-- Dinamico -->
            </div>
        </section>

        <!-- SETTINGS TAB -->
        <section id="settings" class="tab-content">
            <div class="admin-section-header">
                <h2>Admin Credentials</h2>
            </div>
            <form id="settings-form" class="admin-form">
                <div class="admin-form-group">
                    <label>ADMIN EMAIL</label>
                    <input type="email" id="admin-email" required>
                </div>
                <div class="admin-form-group password-group">
                    <label>NEW PASSWORD</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="admin-password" placeholder="Lascia vuoto per non cambiare">
                        <span class="toggle-password" id="toggle-admin-password">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </span>
                    </div>
                </div>
                <button type="submit" class="save-btn">UPDATE CREDENTIALS</button>
            </form>
        </section>
    </main>

    <!-- MODAL FOR ADD/EDIT -->
    <div id="admin-modal" class="admin-modal">
        <div class="admin-modal-content">
            <span class="close-admin-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">ADD ITEM</h2>
            <form id="modal-form">
                <div id="modal-fields">
                    <!-- Dinamico -->
                </div>
                <div class="admin-form-group" style="margin-top: 20px;">
                    <button type="submit" class="save-btn">SAVE CHANGES</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="admin.js"></script>
</body>
</html>
